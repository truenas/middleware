name: mypy static type checks

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/truenas/middleware:master

    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: |
          cd src/middlewared
          mypy \
            middlewared/alert/ \
            middlewared/api/base/ \
            middlewared/common/ \
            middlewared/plugins/acme_protocol/ \
            middlewared/plugins/acme_dns_authenticator/ \
            middlewared/plugins/acme_registration/ \
            middlewared/plugins/alert/ \
            middlewared/plugins/api_key/ \
            middlewared/plugins/app_registry/ \
            middlewared/plugins/apps/ \
            middlewared/plugins/apps_images/ \
            middlewared/plugins/catalog/ \
            middlewared/plugins/cloud_backup/ \
            middlewared/plugins/container/ \
            middlewared/plugins/cron/ \
            middlewared/plugins/docker/ \
            middlewared/plugins/ftp/ \
            middlewared/plugins/hardware/ \
            middlewared/plugins/init_shutdown_script/ \
            middlewared/plugins/kmip/ \
            middlewared/plugins/mail/ \
            middlewared/plugins/network_routes/ \
            middlewared/plugins/ntp/ \
            middlewared/plugins/ports/ \
            middlewared/plugins/reporting/ \
            middlewared/plugins/rsync/ \
            middlewared/plugins/security/ \
            middlewared/plugins/service_/ \
            middlewared/plugins/snapshot/ \
            middlewared/plugins/snmp/ \
            middlewared/plugins/ssh/ \
            middlewared/plugins/support/ \
            middlewared/plugins/sysctl/ \
            middlewared/plugins/system_vendor/ \
            middlewared/plugins/truecommand/ \
            middlewared/plugins/truenas/ \
            middlewared/plugins/truenas_connect/ \
            middlewared/plugins/truesearch.py \
            middlewared/plugins/tunable/ \
            middlewared/plugins/webshare/ \
            middlewared/plugins/update_/ \
            middlewared/plugins/ups/ \
            middlewared/plugins/vm/ \
            middlewared/plugins/zfs/ \
            middlewared/plugins/dns_client.py \
            middlewared/plugins/filesystem.py \
            middlewared/plugins/keyvalue.py \
            middlewared/plugins/pwenc.py \
            middlewared/service/sharing_task_service_part.py \
            middlewared/service/generic_sharing_service.py \
            middlewared/utils/ \
            middlewared/test/integration/runner/ \
            middlewared/auth.py \
            middlewared/job.py \
            --exclude middlewared/etc_files \
            --exclude middlewared/utils/directoryservices \
            --exclude middlewared/utils/lio \
            --exclude middlewared/utils/nvmet \
            --follow-imports silent \
            --strict

      - name: mypy middlewared_docs
        run: |
          mypy \
            --follow-imports silent \
            --ignore-missing-imports \
            src/middlewared_docs/changelog.py \
            src/middlewared_docs/generate_docs.py
