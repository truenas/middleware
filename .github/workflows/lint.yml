name: flake8

on:
  pull_request:
    types:
      - 'synchronize'
      - 'opened'

jobs:
  lint:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Check illegal patterns
      run: |
        if grep -r "Literal\[None\]" src/middlewared/middlewared/api/; then
          echo "❌ Literal[None] usage found in middlewared/api/. Use None instead."
          exit 1
        else
          echo "✅ No Literal[None] usage found in middlewared/api/"
        fi
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: 3.13
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 flake8-builtins flake8-tidy-imports flake8-literal import-linter
    - name: Lint imports
      run: |
        cd src/middlewared/ && lint-imports
    - name: Lint with flake8
      run: |
        flake8 --config=src/middlewared/setup.cfg src/
