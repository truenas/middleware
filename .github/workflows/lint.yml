name: flake8

on:
  pull_request:
    types:
      - 'synchronize'
      - 'opened'

jobs:
  lint:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Check for Literal[None] in API schemas
      run: |
        if grep -r "Literal\[None\]" src/middlewared/middlewared/api/; then
          echo "❌ Literal[None] usage found in middlewared/api/. Use None instead."
          exit 1
        else
          echo "✅ No Literal[None] usage found in middlewared/api/"
        fi
    - name: "Check for overly generic generic `type: ignore`"
      run: |
        if egrep -R ' type: ignore$' src/middlewared; then
          echo "Overly generic 'type: ignore' comments found in src/middlewared. Please, use specific error codes instead."
          exit 1
        else
          echo "✅ No overly generic 'type: ignore' comments found in src/middlewared"
        fi
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: 3.13
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install import-linter
    - name: Lint imports
      run: |
        cd src/middlewared/ && lint-imports
